<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book form</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <h1>Book form</h1>
    <main>
      <form action="/submit" method="post">
        <label for="name">Book name:</label>
        <input type="text" name="name" id="name" required />

        <label for="author">Author:</label>
        <input type="text" name="author" id="author" required />

        <label for="year">Year:</label>
        <input type="number" name="year" id="year" min="868" max="2026" />

        <label for="genre">Genre:</label>
        <select name="genre" id="genre">
          <option value="fantasy">Fantasy</option>
          <option value="detective">Detective</option>
          <option value="history">History</option>
          <option value="science">Science</option>
          <option value="other">Other</option>
        </select>

        <label for="desc">Description:</label>
        <textarea name="desc" id="desc">Description:</textarea>

        <label for="cover">Cover:</label>
        <input type="file" name="cover" id="cover" accept="image/" />

        <fieldset>
          <legend>Score</legend>

          <div>
            <div>
              <input type="radio" id="r1" name="rating" value="1" required />
              <label for="r1">1</label>
            </div>

            <div>
              <input type="radio" id="r2" name="rating" value="2" />
              <label for="r2">2</label>
            </div>

            <div>
              <input type="radio" id="r3" name="rating" value="3" />
              <label for="r3">3</label>
            </div>

            <div>
              <input type="radio" id="r4" name="rating" value="4" />
              <label for="r4">4</label>
            </div>

            <div>
              <input type="radio" id="r5" name="rating" value="5" />
              <label for="r5">5</label>
            </div>
          </div>
        </fieldset>

        <button type="submit">Register</button>
      </form>
    </main>
  </body>
</html>
